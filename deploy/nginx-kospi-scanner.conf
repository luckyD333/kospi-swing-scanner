# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    server_name sigbora.com www.sigbora.com;
    return 301 https://sigbora.com$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    server_name sigbora.com www.sigbora.com;

    ssl_certificate     /etc/letsencrypt/live/sigbora.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sigbora.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # signal-web (Next.js)
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_cache_bypass $http_upgrade;
    }

    # signal-api (FastAPI) — /api/ 경로 라우팅
    location /api/ {
        proxy_pass         http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
