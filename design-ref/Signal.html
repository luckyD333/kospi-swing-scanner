function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;
  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);
  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    const ro = typeof ResizeObserver !== 'undefined' ? new ResizeObserver(clampToViewport) : null;
    if (ro) { ro.observe(document.documentElement); return () => ro.disconnect(); }
    window.addEventListener('resize', clampToViewport);
    return () => window.removeEventListener('resize', clampToViewport);
  }, [open, clampToViewport]);
  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);
  const dismiss = () => { setOpen(false); window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); };
  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) };
      clampToViewport();
    };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };
  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" onMouseDown={(e) => e.stopPropagation()} onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label, children }) {
  return <><div className="twk-sect">{label}</div>{children}</>;
}
function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl"><span>{label}</span>{value != null && <span className="twk-val">{value}</span>}</div>
      {children}
    </div>
  );
}
function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}
function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}
function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;
  const valueRef = React.useRef(value);
  valueRef.current = value;
  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const i = Math.floor(((clientX - r.left - 2) / (r.width - 4)) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };
  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => { if (!trackRef.current) return; const v = segAt(ev.clientX); if (v !== valueRef.current) onChange(v); };
    const up = () => { setDragging(false); window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>{o.label}</button>
        ))}
      </div>
    </TweakRow>
  );
}

/* ─────────────────── SCRAMBLE HOOK ─────────────────── */
function useScramble(target, duration = 900) {
  const [display, setDisplay] = useState(target.replace(/./g, '0'));
  const chars = '0123456789';
  useEffect(() => {
    const len = target.length;
    const start = performance.now();
    let raf;
    function frame(now) {
      const elapsed = now - start;
      const progress = Math.min(elapsed / duration, 1);
      const lockedCount = Math.floor(progress * len);
      let result = '';
      for (let i = 0; i < len; i++) {
        if (i < lockedCount) {
          result += target[i];
        } else {
          result += /[0-9]/.test(target[i])
            ? chars[Math.floor(Math.random() * chars.length)]
            : target[i];
        }
      }
      setDisplay(result);
      if (progress < 1) raf = requestAnimationFrame(frame);
    }
    raf = requestAnimationFrame(frame);
    return () => cancelAnimationFrame(raf);
  }, [target]);
  return display;
}

/* ─────────────────── TICKER CARD ─────────────────── */
function TickerCard({ signal, onClick, index, tweaks }) {
  const [hov, setHov] = useState(false);
  const [visible, setVisible] = useState(false);

  useEffect(() => {
    const timer = setTimeout(() => setVisible(true), index * 60);
    return () => clearTimeout(timer);
  }, [index]);

  const changeColor = signal.change >= 0 ? 'var(--gain)' : 'var(--loss)';
  const changeSign = signal.change >= 0 ? '+' : '';
  const rrColor = signal.rrBand === 'SWEET' ? 'var(--gain)' : signal.rrBand === 'UNDER' ? 'var(--loss)' : 'var(--warning)';
  const rsiColor = signal.rsi < 30 ? 'var(--gain)' : signal.rsi > 70 ? 'var(--loss)' : 'var(--body)';
  const compact = tweaks.cardDensity === 'compact';
  const nameFontSize = compact ? '32px' : '42px';
  const tickerFontSize = compact ? '16px' : '21px';

  const metrics = [
    { label: 'RR',  value: signal.rrRatio.toFixed(1), color: rrColor },
    { label: 'SCR', value: signal.score,               color: 'var(--body)' },
    { label: 'ATR', value: `₩${signal.atr.toLocaleString()}`, color: 'var(--body)' },
    { label: 'RSI', value: signal.rsi,                 color: rsiColor },
    { label: 'PER', value: signal.per != null ? signal.per + 'x' : '—', color: 'var(--body)' },
  ];

  return (
    <div
      onClick={onClick}
      onMouseEnter={() => setHov(true)}

        background: 'var(--canvas)',
        outline: hov ? '1px solid var(--hairline-strong)' : '1px solid transparent',
        outlineOffset: '-1px',
        padding: compact ? '32px 24px' : '52px 32px',
        cursor: 'pointer',
        transition: 'outline-color 200ms ease-out, opacity 400ms ease-out, transform 400ms ease-out',
        opacity: visible ? 1 : 0,
        transform: visible ? 'translateY(0)' : 'translateY(16px)',
        display: 'flex',
        flexDirection: 'column',
        gap: '10px',
        height: '100%',
      }}

      {/* 종목명 — 주역 */}
      <div style={{
        fontFamily: 'var(--f-display)',
        fontSize: nameFontSize,
        fontWeight: 400,
        lineHeight: 1.1,
        letterSpacing: '1px',
        color: 'var(--ink)',
        wordBreak: 'keep-all',
      }}>
        {signal.name}
      </div>

      {/* 종목 코드 — 이름의 약 50% */}
      <div style={{
        fontFamily: 'var(--f-mono)',
        fontSize: tickerFontSize,
        fontWeight: 400,
        lineHeight: 1,
        letterSpacing: '1px',
        color: 'var(--muted)',

        {signal.ticker}
      </div>

      {/* 현재가 + 등락 */}
      <div style={{ display: 'flex', alignItems: 'baseline', gap: '10px', marginTop: '4px' }}>
        <span style={{ ...T.numericMd, fontSize: '20px', color: 'var(--body-strong)' }}>
          ₩{signal.currentPrice.toLocaleString()}
        </span>
        <span style={{ ...T.caption, fontSize: '12px', color: changeColor }}>
          {changeSign}{signal.change}%

      </div>

      {/* 하단 고정 영역: 진입/손절/목표 → 핵심지표 → 전략태그 */}
      <div style={{ marginTop: 'auto' }}>

        {/* 진입 / 손절 / 목표 — 위 */}
        <div style={{
          display: 'flex',
          paddingTop: '14px',
          paddingBottom: '14px',

        }}>

/* ─────────────────── CATALOG PAGE ─────────────────── */
function CatalogPage({ onSelect, tweaks }) {
  const [strategy, setStrategy] = useState('ALL');
  const [timeframe, setTimeframe] = useState('ALL');
  const [sortBy, setSortBy] = useState('score');

  const filtered = SIGNALS_DATA
    .filter(s => strategy === 'ALL' || s.strategy === strategy)
    .filter(s => timeframe === 'ALL' || s.timeframe === timeframe)
    .sort((a, b) => {
      if (sortBy === 'score') return b.score - a.score;
      if (sortBy === 'rr') return b.rrRatio - a.rrRatio;
      if (sortBy === 'entry') return b.entry - a.entry;
      return 0;
    });

  return (
    <div style={{ background: 'var(--canvas)', minHeight: '100vh' }}>
      <TopNav onNavigate={() => {}} />

      {/* Filter bar */}
      <FilterBar
        activeStrategy={strategy}

      {/* Grid */}
      <div style={{

        background: 'var(--canvas)',

          <div key={signal.ticker} style={{

            borderRight: '1px solid var(--hairline)',
            borderBottom: '1px solid var(--hairline)',

              onClick={() => onSelect(signal)}

              tweaks={tweaks}

/* ─────────────────── PRICE SCRAMBLE COMPONENT ─────────────────── */
function PriceScramble({ price, change, fontSize }) {
  const priceStr = price.toLocaleString();
  const raw = priceStr.replace(/[^0-9]/g, '');
  const scrambled = useScramble(raw, 1000);
  let display = priceStr;
  if (scrambled.length === raw.length) {
    let si = 0;
    display = priceStr.split('').map(ch => /[0-9]/.test(ch) ? scrambled[si++] : ch).join('');
  }
  const changeColor = change >= 0 ? 'var(--gain)' : 'var(--loss)';
  const changeSign = change >= 0 ? '+' : '';
  return (
    <div style={{ display: 'flex', alignItems: 'baseline', gap: '16px', flexWrap: 'wrap' }}>
      <span style={{
        fontFamily: 'var(--f-mono)',
        fontSize,
        fontWeight: 400,
        lineHeight: 1.1,
        letterSpacing: '-0.5px',
        color: 'var(--ink)',
      }}>
        ₩{display}
      </span>
      {change !== null && (
        <span style={{
          fontFamily: 'var(--f-mono)',
          fontSize: `calc(${fontSize} * 0.55)`,
          fontWeight: 400,
          color: changeColor,
          letterSpacing: '1px',
        }}>
          {changeSign}{change}%
        </span>
      )}
    </div>
  );
}

        <div style={{
          display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: '0',
          borderBottom: '1px solid var(--hairline)',
        }}>
          {[
            ['시가총액', signal.marketCap || '—', ''],
            ['거래량', signal.volume ? signal.volume + '주' : '—', '당일 기준'],
            ['외국인 비율', signal.foreignRatio || (15 + (signal.ticker.charCodeAt(0) % 40)).toFixed(1) + '%', '최근 공시'],
            ['기관 순매수', signal.instNet || (signal.change > 0 ? '+' : '') + Math.round((signal.change * signal.currentPrice * 1000)).toLocaleString() + '원', '당일'],
          ].map(([label, value, sub], i) => (
            <div key={label} style={{
              padding: '20px 0',
              borderRight: i < 3 ? '1px solid var(--hairline)' : 'none',
              paddingRight: i < 3 ? '32px' : '0',
              paddingLeft: i > 0 ? '32px' : '0',
            }}>
              <div style={{ ...T.caption, color: 'var(--muted)', marginBottom: '10px' }}>{label}</div>
              <div style={{ fontFamily: 'var(--f-mono)', fontSize: '20px', color: 'var(--ink)' }}>{value}</div>
              {sub && <div style={{ ...T.caption, color: 'var(--muted-soft)', marginTop: '6px' }}>{sub}</div>}
            </div>
          ))}
        </div>
      </div>

      <div style={{ height: '80px' }} />

      <Footer />
    </div>
  );
}

/* ─────────────────── FOOTER ─────────────────── */
/* ─────────────────── DISCLAIMER BAR (fixed bottom) ─────────────────── */
function DisclaimerBar() {
  return (
    <div style={{
      position: 'fixed', bottom: 0, left: 0, right: 0, zIndex: 99,
      height: '30px',
      background: 'rgba(0,0,0,0.97)',
      backdropFilter: 'blur(8px)',
      borderTop: '1px solid var(--hairline)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      padding: '0 40px',
    }}>
      <p style={{ ...T.caption, color: 'var(--muted-soft)', fontSize: '10px', letterSpacing: '1.5px' }}>
        본 시그널은 알고리즘이 생성한 결과로 투자 권유가 아닙니다. 모든 투자 결정의 책임은 투자자 본인에게 있습니다.
      </p>
    </div>
  );
}

/* ─────────────────── FOOTER ─────────────────── */
function Footer() {
  return (
    <footer style={{
      background: 'var(--canvas)',
      borderTop: '1px solid var(--hairline)',
      padding: '20px 40px',
      marginBottom: '30px',
    }}>
      <div style={{ maxWidth: '1280px', margin: '0 auto', display: 'flex', justifyContent: 'flex-end' }}>
        <div style={{ ...T.wordmark, color: 'var(--muted-soft)' }}>SIGNAL</div>
      </div>
    </footer>
  );
}

/* ─────────────────── APP ROOT ─────────────────── */
function App() {
  const [page, setPage] = useState('catalog'); // 'catalog' | 'detail'
  const [selected, setSelected] = useState(null);

  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "heroSize": "normal",
    "gridCols": "auto",
    "cardDensity": "normal"
  }/*EDITMODE-END*/;

  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  const handleSelect = useCallback((signal) => {
    setSelected(signal);
    setPage('detail');
    window.scrollTo({ top: 0 });
  }, []);

  const handleBack = useCallback(() => {
    setPage('catalog');
    setSelected(null);
    window.scrollTo({ top: 0 });
  }, []);

  return (
    <>
      {page === 'catalog' && (
        <CatalogPage onSelect={handleSelect} tweaks={tweaks} />
      )}
      {page === 'detail' && selected && (
        <DetailPage signal={selected} onBack={handleBack} tweaks={tweaks} />
      )}
      <DisclaimerBar />

      <TweaksPanel>
        <TweakSection label="Hero" />
        <TweakRadio
          label="Hero Size"
          value={tweaks.heroSize}
          options={["normal","large"]}
          onChange={v => setTweak('heroSize', v)}
        />
        <TweakSection label="Catalog" />
        <TweakRadio
          label="Grid Columns"
          value={tweaks.gridCols}
          options={["auto","2"]}
          onChange={v => setTweak('gridCols', v)}
        />
        <TweakRadio
          label="Card Density"
          value={tweaks.cardDensity}
          options={["normal","compact"]}
          onChange={v => setTweak('cardDensity', v)}
        />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
