# weights.yml — Multi-factor 점수 가중치 (신규 스키마)
# Task 6 이후: 잠재력 점수 5 factor (본질 매력도) + 기회 점수는 regret_scorer 에서 직접 관리
#
# 잠재력 점수 factor (종목 본질):
#   - momentum_3m: 3개월(60봉) 누적 수익률 (중기 추세)
#   - regime_score: 시장 국면 (BULL/BEAR 자동 분포 shift)
#   - roe: ROE (수익성, STOCK 전용)
#   - per: PER (저평가, STOCK 전용, lower_better)
#   - liquidity: 유동성 (시총×거래대금, cross-sectional rank)
#
# 기회 점수 factor: regret_scorer.py 에서 직접 관리
#   - bull_reward (40%) / max_drawdown (20%) / dist_to_stop (15%) / signal_freshness (25%)
#   - R:R 75% + freshness 25%
priorities:
  - key: momentum_3m
    label: 가격 모멘텀 (3개월)
    weight: 35.0
    direction: higher_better
    applies_to_pools: [STOCK, ETN_ETF]

  - key: regime_score
    label: 시장 국면
    weight: 15.0
    direction: higher_better
    applies_to_pools: [STOCK, ETN_ETF]

  - key: roe
    label: ROE (수익성)
    weight: 15.0
    direction: higher_better
    applies_to_pools: [STOCK]

  - key: per
    label: PER (저평가)
    weight: 10.0
    direction: lower_better
    applies_to_pools: [STOCK]

  - key: liquidity
    label: 유동성
    weight: 25.0
    direction: higher_better
    applies_to_pools: [STOCK, ETN_ETF]

must_have: []

strategy_weights:
  # timing-study 백테스트 실측 tier (2026-05-18):
  #   Tier A (1.4): strategy_five — avg 12.55%/win 82%
  #   Tier A (1.3): strategy_three — avg 11.38%/win 75%
  #   Tier B (1.1): strategy_four — confluence 핵 (단독은 중간)
  #   Tier C (1.0): strategy_one — 표본 부족 (6건/win 100% with s4)
  #   Tier D (0.8): strategy_two — walk-forward -0.06% (손익분기)
  # r1/r2 fallback 은 base 와 동일 tier
  strategy_five_bull_flag: 1.4
  strategy_five_bull_flag_1h: 1.4
  strategy_five_bull_flag_30m: 1.4
  strategy_three_trend_following: 1.3
  strategy_three_1h: 1.3
  strategy_three_30m: 1.3
  strategy_four_pullback_ma: 1.1
  strategy_four_pullback_ma_1h: 1.1
  strategy_four_pullback_ma_30m: 1.1
  strategy_one_d_v2: 1.0
  strategy_one_w_v2: 1.0
  strategy_one_1h_v2: 1.0
  strategy_one_30m_v2: 1.0
  strategy_one_d_v2_r1: 1.0
  strategy_one_d_v2_r2: 1.0
  strategy_one_w_v2_r1: 1.0
  strategy_one_w_v2_r2: 1.0
  strategy_one_1h_v2_r1: 1.0
  strategy_one_1h_v2_r2: 1.0
  strategy_one_30m_v2_r1: 1.0
  strategy_one_30m_v2_r2: 1.0
  strategy_two_cross_sectional_momentum: 0.8
  strategy_two_1h: 0.8
  strategy_two_30m: 0.8
